<html>
    <head>
        <title>Script Operator</title>
    </head>
    <body>
        <script type ="text/javascript">
            var count;
            document.write("Starting loop" +"br /");
            for (count=0; count <10; count ++){
                document.write("Current count: " + count);
                document.write("br /");
            }
        </script>
    </body>
</html>
